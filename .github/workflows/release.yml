name: Build and release binaries

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Build release
        run: make release-linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixoCrop-linux-x86_64
          path: release/pixoCrop-linux-x86_64.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,build]"

      - name: Test
        run: |
          python -m compileall src tests
          python -m pytest -q

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --onedir --name "pixoCrop" --hidden-import fitz --add-data "assets;assets" --icon "assets/pixoCrop.ico" src/pixocrop/app.py

      - name: Package archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist/pixoCrop -DestinationPath release/pixoCrop-windows-x64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixoCrop-windows-x64
          path: release/pixoCrop-windows-x64.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,build]"

      - name: Verify runner architecture
        run: |
          actual_arch="$(uname -m)"
          expected_arch="${{ matrix.arch }}"
          echo "Runner architecture: ${actual_arch}"
          test "${actual_arch}" = "${expected_arch}"

      - name: Test
        run: |
          python -m compileall src tests
          python -m pytest -q

      - name: Build app bundle
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name "pixoCrop" --hidden-import fitz --add-data "assets:assets" --icon "assets/pixoCrop.icns" src/pixocrop/app.py

      - name: Package archive
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "dist/pixoCrop.app" "release/pixoCrop-macos-${{ matrix.arch }}.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixoCrop-macos-${{ matrix.arch }}
          path: release/pixoCrop-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lah release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
