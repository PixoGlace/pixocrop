name: Build and release binaries

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Build release
        run: make release-linux

      - name: Upload Linux portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixoCrop-linux-x86_64-portable
          path: release/pixoCrop-linux-x86_64.tar.gz
          if-no-files-found: error

      - name: Upload Linux Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixoCrop-linux-amd64-deb
          path: release/pixocrop_*_amd64.deb
          if-no-files-found: error

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,build]"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Test
        run: |
          python -m compileall src tests
          python -m pytest -q

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --onedir --name "pixoCrop" --hidden-import fitz --add-data "assets;assets" --icon "assets/pixoCrop.ico" src/pixocrop/app.py

      - name: Package archive
        shell: pwsh
        run: |
          python packaging/create_packaging_art.py
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist/pixoCrop -DestinationPath release/pixoCrop-windows-x64.zip -Force
          $env:PIXO_APP_NAME = "pixoCrop"
          $env:PIXO_APP_VERSION = python -c "from pixocrop.config import VERSION; print(VERSION)"
          $env:PIXO_SOURCE_DIR = "$PWD\dist\pixoCrop"
          $env:PIXO_OUTPUT_DIR = "$PWD\release"
          $env:PIXO_ROOT_DIR = "$PWD"
          $env:PIXO_WIZARD_IMAGE = "$PWD\build\packaging\windows-wizard.bmp"
          $env:PIXO_WIZARD_SMALL_IMAGE = "$PWD\build\packaging\windows-small.bmp"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "packaging\windows\pixoCrop.iss"

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixoCrop-windows-x64-portable
          path: release/pixoCrop-windows-x64.zip
          if-no-files-found: error

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixoCrop-windows-x64-installer
          path: release/pixoCrop-windows-x64-setup.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,build]"

      - name: Install DMG tooling
        run: brew install create-dmg

      - name: Verify runner architecture
        run: |
          actual_arch="$(uname -m)"
          expected_arch="${{ matrix.arch }}"
          echo "Runner architecture: ${actual_arch}"
          test "${actual_arch}" = "${expected_arch}"

      - name: Test
        run: |
          python -m compileall src tests
          python -m pytest -q

      - name: Build app bundle
        run: |
          app_version="$(PYTHONPATH=src python -c 'from pixocrop.config import VERSION; print(VERSION)')"
          python -m PyInstaller --noconfirm --clean --windowed --name "pixoCrop" --hidden-import fitz --add-data "assets:assets" --icon "assets/pixoCrop.icns" --osx-bundle-identifier "io.github.pixoglace.pixocrop" src/pixocrop/app.py
          plutil -replace CFBundleDisplayName -string "pixoCrop" "dist/pixoCrop.app/Contents/Info.plist"
          plutil -replace CFBundleShortVersionString -string "${app_version}" "dist/pixoCrop.app/Contents/Info.plist"
          plutil -replace CFBundleVersion -string "${app_version}" "dist/pixoCrop.app/Contents/Info.plist"

      - name: Package archive
        run: |
          python packaging/create_packaging_art.py
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "dist/pixoCrop.app" "release/pixoCrop-macos-${{ matrix.arch }}.zip"
          rm -rf "release/dmg-root-${{ matrix.arch }}"
          mkdir -p "release/dmg-root-${{ matrix.arch }}"
          cp -R "dist/pixoCrop.app" "release/dmg-root-${{ matrix.arch }}/pixoCrop.app"
          create-dmg \
            --volname "PixoCrop" \
            --volicon "assets/pixoCrop.icns" \
            --background "assets/dmg/pixocrop-dmg-background.png" \
            --window-pos 200 120 \
            --window-size 660 420 \
            --text-size 13 \
            --icon-size 112 \
            --icon "pixoCrop.app" 128 255 \
            --hide-extension "pixoCrop.app" \
            --app-drop-link 515 255 \
            --hdiutil-quiet \
            --no-internet-enable \
            "release/pixoCrop-macos-${{ matrix.arch }}.dmg" \
            "release/dmg-root-${{ matrix.arch }}"

      - name: Upload macOS portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixoCrop-macos-${{ matrix.arch }}-portable
          path: release/pixoCrop-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

      - name: Upload macOS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixoCrop-macos-${{ matrix.arch }}-installer
          path: release/pixoCrop-macos-${{ matrix.arch }}.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lah release-assets

      - name: Verify release assets
        shell: bash
        run: |
          test -f release-assets/pixoCrop-linux-x86_64.tar.gz
          compgen -G "release-assets/pixocrop_*_amd64.deb" > /dev/null
          test -f release-assets/pixoCrop-windows-x64.zip
          test -f release-assets/pixoCrop-windows-x64-setup.exe
          test -f release-assets/pixoCrop-macos-arm64.zip
          test -f release-assets/pixoCrop-macos-arm64.dmg
          test -f release-assets/pixoCrop-macos-x86_64.zip
          test -f release-assets/pixoCrop-macos-x86_64.dmg

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
